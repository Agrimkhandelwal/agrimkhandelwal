<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b1a"/>
      <stop offset="100%" stop-color="#150f2b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .kw { fill: #C084FC; }
      .str { fill: #86efac; }
      .prop { fill: #7dd3fc; }
      .punc { fill: #8b8fa3; }
      .txt { fill: #e2e2f0; }
      .comment { fill: #565875; font-style: italic; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <circle cx="1050" cy="60" r="220" fill="url(#glow1)"/>
  <circle cx="150" cy="280" r="200" fill="url(#glow2)"/>
  <rect width="1200" height="320" rx="18" fill="none" stroke="#2a2440" stroke-width="1.5"/>

  <!-- window title bar -->
  <rect x="0" y="0" width="1200" height="46" rx="18" fill="#161327"/>
  <rect x="0" y="28" width="1200" height="18" fill="#161327"/>
  <circle cx="34" cy="23" r="7" fill="#ff5f56"/>
  <circle cx="58" cy="23" r="7" fill="#ffbd2e"/>
  <circle cx="82" cy="23" r="7" fill="#27c93f"/>
  <text x="600" y="28" text-anchor="middle" class="mono comment" font-size="14">agrim-khandelwal — ~/portfolio/hero.ts</text>

  <!-- code lines -->
  <g class="mono" font-size="27">
    <text x="55" y="105"><tspan class="kw">const</tspan><tspan class="txt"> developer </tspan><tspan class="punc">= {</tspan></text>

    <text x="90" y="148"><tspan class="prop">name</tspan><tspan class="punc">: </tspan><tspan class="str">"Agrim Khandelwal"</tspan><tspan class="punc">,</tspan></text>

    <text x="90" y="191"><tspan class="prop">role</tspan><tspan class="punc">: </tspan><tspan class="str">"Full Stack Developer"</tspan><tspan class="punc">,</tspan></text>

    <text x="90" y="234"><tspan class="prop">building</tspan><tspan class="punc">: </tspan><tspan class="str">"AI-powered products"</tspan><tspan class="punc">,</tspan></text>

    <text x="90" y="277"><tspan class="prop">basedIn</tspan><tspan class="punc">: </tspan><tspan class="str">"India"</tspan>
      <tspan class="txt" dx="12">🇮🇳</tspan>
    </text>

    <text x="55" y="308"><tspan class="punc">};</tspan></text>
  </g>

  <!-- blinking cursor -->
  <rect x="230" y="288" width="14" height="26" fill="#F472B6">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
